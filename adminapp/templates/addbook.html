{% extends 'adminbase.html' %}
{% load static %}
{% block admin %}
<div class="row">
<h3 class="text-center text-success">Add Books<h3>
    <div class="col-sm-10 mx-auto">
        <div class="card p-4">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row">
                    <div class="col-sm-12">
                        <label for="title">book title</label>
                        <input type="text" id="title" name="title" class="form-control mb-3" required>
                    </div>
                </div>
                 <div class="row">
                    <div class="col-sm-12">
                        <label for="author">author</label>
                        <input type="text" id="author" name="author" class="form-control mb-3" required>
                    </div>
                </div>
                 <div class="row">
                    <div class="col-sm-12">
                        <label for="cat">Category</label>
                        <select  id="cat" name="cat" class="form-control mb-3" required>
                            <option value="">--select category--</option>
                            {% for c in categories %}
                            <option value="{{c.id}}">{{c.name}}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12">
                        <label for="desc">Description</label>
                        <textarea  id="disc" name="description" class="form-control mb-3" required></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12">
                        <label for="og">Original Price</label>
                        <input  id="op" name="original_price" class="form-control mb-3" required>
                    </div>
                </div>
                 <div class="row">
                    <div class="col-sm-12">
                        <label for="og">Selling Price</label>
                        <input type="number" id="sp" name="price" class="form-control mb-3" required>
                    </div>
                </div>
                 <div class="row">
                    <div class="col-sm-12">
                        <label for="pd">Published Date</label>
                        <input type="date" id="pd" name="published_date" class="form-control mb-3" required>
                    </div>
                </div>
                 <div class="row">
                    <div class="col-sm-12">
                        <label for="lang">Language</label>
                        <input type="text" id="lang" name="language" class="form-control mb-3" required>
                    </div>
                </div>
                 <div class="row">
                    <div class="col-sm-12">
                        <label for="ci">Cover Image</label>
                        <input type="file" id="ci" name="cover_image" class="form-control mb-3" required>
                    </div>
                </div>
                 <div class="row">
                    <div class="col-sm-12">
                        <label for="st">Stock</label>
                        <input type="number" id="st" name="stock" class="form-control mb-3" required>
                    </div>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-success">Add Books</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
